```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luminescent Games Wiki</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#111827;
    color:white;
    overflow:hidden;
}

/* Menu Button */
#menuBtn{
    position:fixed;
    top:20px;
    left:20px;
    background:#3b82f6;
    border:none;
    color:white;
    padding:12px 18px;
    border-radius:8px;
    cursor:pointer;
    font-size:18px;
}

/* Sidebar */
.sidebar{
    position:fixed;
    top:0;
    left:-260px;
    width:260px;
    height:100%;
    background:#1f2937;
    transition:.3s;
    padding-top:70px;
    box-shadow:4px 0 15px rgba(0,0,0,.3);
}

.sidebar.open{
    left:0;
}

.sidebar button{
    width:100%;
    background:none;
    border:none;
    color:white;
    padding:18px;
    text-align:left;
    cursor:pointer;
    font-size:18px;
    transition:.2s;
}

.sidebar button:hover{
    background:#374151;
}

/* Main Content */
.content{
    margin-left:0;
    padding:80px 40px;
    transition:.3s;
}

.content.shift{
    margin-left:260px;
}

h1{
    margin-bottom:20px;
}

.page{
    display:none;
}

.page.active{
    display:block;
}
</style>
</head>
<body>

<button id="menuBtn">☰ Menu</button>

<div class="sidebar" id="sidebar">
    <button onclick="showPage('home')">🏠 Home</button>
    <button onclick="showPage('commands')">⌨️ Commands</button>
</div>

<div class="content" id="content">

    <div id="home" class="page active">
        <h1>Welcome</h1>
        <p>Welcome to the Luminescent Games Wiki.</p>
    </div>

    <div id="commands" class="page">
        <h1>Commands</h1>
        <p>Put your command list here.</p>
    </div>

</div>

<script>
const menuBtn = document.getElementById("menuBtn");
const sidebar = document.getElementById("sidebar");
const content = document.getElementById("content");

menuBtn.onclick = () => {
    sidebar.classList.toggle("open");
    content.classList.toggle("shift");
};

function showPage(pageId){

    document.querySelectorAll(".page").forEach(page=>{
        page.classList.remove("active");
    });

    document.getElementById(pageId).classList.add("active");
}
</script>

</body>
</html>
```
