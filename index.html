
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luminescent Games Wiki</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#0f172a;
    color:white;
}

/* ===========================
   Sidebar
=========================== */

.sidebar{
    position:fixed;
    left:0;
    top:0;
    width:250px;
    height:100vh;
    background:#1e293b;
    padding:20px;
    border-right:2px solid #334155;
}

.sidebar h2{
    margin-bottom:25px;
    text-align:center;
}

.sidebar button{
    width:100%;
    padding:14px;
    margin-bottom:10px;
    border:none;
    border-radius:8px;
    background:#3b82f6;
    color:white;
    font-size:16px;
    cursor:pointer;
}

.sidebar button:hover{
    background:#2563eb;
}

/* ===========================
   Main Content
=========================== */

.content{
    margin-left:270px;
    padding:40px;
}

.page{
    display:none;
}

.page.active{
    display:block;
}

/* ===========================
   Command Cards
=========================== */

.command-card{
    background:#1e293b;
    border-radius:12px;
    padding:20px;
    margin-bottom:25px;
    max-width:800px;
}

.command-card h2{
    margin-bottom:15px;
}

.command-card img{
    width:100%;
    max-width:700px;
    border-radius:10px;
    margin-bottom:15px;
}

.command-card p{
    margin-bottom:15px;
    color:#cbd5e1;
}

.command-card input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#0f172a;
    color:white;
    font-size:16px;
}

.command-card button{
    margin-top:15px;
    padding:12px 20px;
    border:none;
    border-radius:8px;
    background:#22c55e;
    color:white;
    cursor:pointer;
    font-size:15px;
}

.command-card button:hover{
    background:#16a34a;
}

.placeholder{
    width:100%;
    height:250px;
    background:#334155;
    border:2px dashed #64748b;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:10px;
    margin-bottom:15px;
    font-size:22px;
}

</style>
</head>
<body>

<!-- ===========================
Sidebar
=========================== -->

<div class="sidebar">

<h2>📖 Wiki</h2>

<button onclick="showPage('home')">
🏠 Home
</button>

<button onclick="showPage('commands')">
⌨️ Commands
</button>

</div>

<!-- ===========================
Content
=========================== -->

<div class="content">

<!-- Home -->

<div id="home" class="page active">

<h1>Welcome to Luminescent Games Wiki</h1>

<br>

<p>
Select a page from the left sidebar.
</p>

</div>

<!-- Commands -->

<div id="commands" class="page">

<h1>Commands</h1>

<br>

<!-- ===========================
COMMAND 1
=========================== -->

<div class="command-card">

<h2>/spawn</h2>

<div class="placeholder">
Image Placeholder
</div>

<p>
Teleports you to spawn.
</p>

<input
type="text"
value="/spawn"
readonly
>

<button onclick="copyCommand('/spawn')">
📋 Copy Command
</button>

</div>

<!-- ===========================
COMMAND 2
=========================== -->

<div class="command-card">

<h2>/shop</h2>

<div class="placeholder">
Image Placeholder
</div>

<p>
Opens the server shop.
</p>

<input
type="text"
value="/shop"
readonly
>

<button onclick="copyCommand('/shop')">
📋 Copy Command
</button>

</div>

<!--
===================================================

TO ADD A NEW COMMAND

Copy one command-card and only change:

/shop
Image Placeholder
Description

Example:

<h2>/warp</h2>

<p>Teleport to a warp.</p>

<input value="/warp">

<button onclick="copyCommand('/warp')">

===================================================
-->

</div>

</div>

<script>

function showPage(page){

document.querySelectorAll(".page").forEach(p=>{
p.classList.remove("active");
});

document.getElementById(page).classList.add("active");

}

function copyCommand(command){

navigator.clipboard.writeText(command);

alert(command + " copied!");

}

</script>

</body>
</html>
