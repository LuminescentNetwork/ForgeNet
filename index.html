
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luminescent Games Wiki</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#0f172a;
    color:white;
}

/* Sidebar */
.sidebar{
    position:fixed;
    left:0;
    top:0;
    width:260px;
    height:100vh;
    background:#1e293b;
    border-right:2px solid #334155;
    padding:20px;
}

.sidebar h2{
    margin-bottom:25px;
    text-align:center;
}

.sidebar button{
    width:100%;
    margin-bottom:10px;
    padding:14px;
    background:#3b82f6;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

.sidebar button:hover{
    background:#2563eb;
}

/* Main Content */
.content{
    margin-left:280px;
    padding:40px;
}

.page{
    display:none;
}

.page.active{
    display:block;
}

/* Fake Image */
.preview-image{
    width:500px;
    height:250px;
    background:#334155;
    border:3px dashed #64748b;
    border-radius:12px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:28px;
    margin-bottom:25px;
}

/* Command Box */
.command-box{
    background:#1e293b;
    padding:20px;
    border-radius:10px;
    margin-top:20px;
    max-width:700px;
}

.command-box input{
    width:100%;
    padding:14px;
    font-size:18px;
    background:#0f172a;
    color:white;
    border:1px solid #475569;
    border-radius:8px;
}

.command-box button{
    margin-top:15px;
    padding:12px 20px;
    background:#22c55e;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.command-box button:hover{
    background:#16a34a;
}
</style>
</head>
<body>

<div class="sidebar">
    <h2>📖 Wiki</h2>

    <button onclick="showPage('home')">🏠 Home</button>
    <button onclick="showPage('commands')">⌨️ Commands</button>
</div>

<div class="content">

    <!-- Home -->
    <div id="home" class="page active">
        <h1>Welcome to Luminescent Games Wiki</h1>

        <br>

        <div class="preview-image">
            Image Placeholder
        </div>

        <p>
            This is an example image area. Replace it later with screenshots
            from your server.
        </p>
    </div>

    <!-- Commands -->
    <div id="commands" class="page">

        <h1>Commands</h1>

        <br>

        <div class="preview-image">
            Command Screenshot
        </div>

        <div class="command-box">
            <h3>/spawn</h3>
            <br>

            <input
                id="command1"
                value="/spawn"
                readonly
            >

            <button onclick="copyCommand('command1')">
                📋 Copy Command
            </button>
        </div>

    </div>

</div>

<script>
function showPage(page){

    document.querySelectorAll(".page").forEach(p=>{
        p.classList.remove("active");
    });

    document.getElementById(page).classList.add("active");
}

function copyCommand(id){

    const box=document.getElementById(id);

    box.select();
    box.setSelectionRange(0,99999);

    navigator.clipboard.writeText(box.value);

    alert("Copied: " + box.value);
}
</script>

</body>
</html>
